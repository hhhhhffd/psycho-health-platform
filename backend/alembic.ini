[alembic]
# Путь к директории с миграциями (относительно этого файла)
script_location = alembic

# Шаблон имён файлов миграций: timestamp_description.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Кодировка исходников миграций
source_encoding = utf-8

# Путь к базе данных переопределяется в env.py из переменных окружения
# sqlalchemy.url = (задаётся в alembic/env.py)

[post_write_hooks]
# Хуки после записи новой миграции (опционально)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
